events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Aggressive no-cache for HTML (forces fresh JS/CSS on every load)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # Versioned assets can be cached forever (hash in filename)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # API proxy to backend
        location /api/ {
            proxy_pass http://backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Uploads proxy to backend
        location /uploads/ {
            proxy_pass http://backend:5000;
            proxy_set_header Host $host;
        }

        # IM webhook proxy to OpenClaw Gateway (Feishu/WeChat/Telegram callbacks)
        location /imhook/ {
            proxy_pass http://openclaw-gateway:18789/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA: all other routes to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
